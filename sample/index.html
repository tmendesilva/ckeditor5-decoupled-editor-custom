    <script src="variables.js"></script>

    <script type="module">
      import CustomDecoupledEditor from "../main.js";
      import CKEditorInspector from "@ckeditor/ckeditor5-inspector";

      CustomDecoupledEditor.create(
        document.querySelector(".document-editor__editable"),
        {
          ...CustomDecoupledEditor.editorConfig,
          variables: variables,
          autosave: {
            save(editor) {
              return saveData(editor.getData());
            },
          },
        },
      )
        .then((editor) => {
          CKEditorInspector.attach(editor);
          window.sampleEditor = editor;
          const toolbarContainer = document.querySelector(
            ".document-editor__toolbar",
          );
          toolbarContainer.appendChild(editor.ui.view.toolbar.element);
          // CKEditorInspector.attach(editor);
          displayStatus(editor);
        })
        .catch((err) => {
          console.error(err);
        });

      // Save the data to a fake HTTP server (emulated here with a setTimeout()).
      function saveData(data) {
        return new Promise((resolve) => {
          setTimeout(() => {
            console.log("Saved");
            resolve();
          }, 1000);
        });
      }

      // Update the "Status: Saving..." info.
      function displayStatus(editor) {
        const pendingActions = editor.plugins.get("PendingActions");
        const statusIndicator = document.querySelector(
          "#snippet-autosave-status",
        );
        pendingActions.on("change:hasAny", (evt, propertyName, newValue) => {
          if (newValue) {
            statusIndicator.classList.add("busy");
          } else {
            statusIndicator.classList.remove("busy");
          }
        });
      }
    </script>
